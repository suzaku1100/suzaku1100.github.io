<!DOCTYPE html>

<head>

<title>ぴた弁！ — おかずをぴったり詰めるパズル</title>
<style>
  :root{--bg:#f5efe3;--surface:#fff;--fg:#2a2620;--muted:#6b6355;--border:#e4dccb;--accent:#c86a26;--accent-fg:#fff;--space-2:16px;--space-3:24px;--space-4:32px;--radius:14px}
  @media (prefers-color-scheme: dark){:root{--bg:#1e1b16;--surface:#26221c;--fg:#f2ece0;--muted:#a79e8e;--border:#39332a;--accent:#f0a05a;--accent-fg:#2a1b0e}}

  .logo{font-size:72px}
  h1{font-size:2rem;margin:8px 0}
  .tag{color:var(--muted)}
  h2{font-size:1.2rem;margin-top:var(--space-4);border-top:1px solid var(--border);padding-top:var(--space-3)}
  a{color:var(--accent)}
  .links{display:flex;flex-wrap:wrap;gap:12px;margin-top:var(--space-2)}
  .links a{display:inline-block;padding:12px 20px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);text-decoration:none;color:var(--fg);min-height:44px}
  footer{margin-top:var(--space-4);color:var(--muted);font-size:0.85rem;border-top:1px solid var(--border);padding-top:16px;text-align:center}
